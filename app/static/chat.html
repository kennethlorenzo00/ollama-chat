<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat — Ollama</title>
  <style>
    :root {
      --sidebar-bg: #1c1c1e;
      --sidebar-text: #e5e5e7;
      --sidebar-text-dim: #98989d;
      --sidebar-hover: #2c2c2e;
      --main-bg: #f5f5f0;
      --user-bg: #e8e6e1;
      --assistant-bg: #ffffff;
      --assistant-border: #e0ddd8;
      --input-bg: #ffffff;
      --input-border: #d1cfc7;
      --accent: #c45c26;
      --accent-hover: #a84d1f;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--main-bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .btn-new {
      width: 100%;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--sidebar-text-dim);
      border-radius: 8px;
      color: var(--sidebar-text);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .btn-new:hover { background: var(--sidebar-hover); }
    .conversations {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .conv-item {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 6px;
      margin: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--sidebar-text-dim);
    }
    .conv-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
    .conv-item.active { background: var(--sidebar-hover); color: var(--sidebar-text); }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message {
      max-width: 720px;
      width: 100%;
      align-self: flex-start;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.55;
    }
    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
    }
    .message.assistant {
      background: var(--assistant-bg);
      border: 1px solid var(--assistant-border);
    }
    .message .role { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .message .content { white-space: pre-wrap; word-break: break-word; }
    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--assistant-border);
      background: var(--main-bg);
    }
    .input-wrap {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    #messageInput {
      flex: 1;
      min-height: 44px;
      max-height: 200px;
      padding: 12px 16px;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      background: var(--input-bg);
    }
    #messageInput:focus { outline: none; border-color: var(--accent); }
    .btn-send {
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-send:hover { background: var(--accent-hover); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .model-bar {
      max-width: 720px;
      margin: 0 auto 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .model-bar select {
      margin-left: 6px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
    }
    .api-key-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .api-key-box {
      background: var(--assistant-bg);
      padding: 24px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .api-key-box h2 { margin: 0 0 8px; font-size: 18px; }
    .api-key-box p { margin: 0 0 16px; color: var(--text-secondary); font-size: 14px; }
    .api-key-box input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .api-key-box button {
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .api-key-box button:hover { background: var(--accent-hover); }
    .hidden { display: none !important; }
    .error-msg { color: #c53030; font-size: 14px; margin-top: 8px; }
    .loading { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="apiKeyOverlay" class="api-key-overlay">
    <div class="api-key-box">
      <h2>Enter your API key</h2>
      <p>Your key is stored in this browser only. Use the same value as in your .env <code>API_KEYS</code>.</p>
      <input type="password" id="apiKeyInput" placeholder="API key" autocomplete="off" />
      <div id="apiKeyError" class="error-msg hidden"></div>
      <button type="button" id="apiKeySubmit">Continue</button>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <button type="button" class="btn-new" id="btnNew">+ New chat</button>
    </div>
    <div class="conversations" id="conversations"></div>
  </aside>

  <main class="main">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="model-bar">
        Model: <select id="modelSelect"><option value="qwen2.5:3b">qwen2.5:3b</option><option value="qwen2.5:1.5b">qwen2.5:1.5b</option><option value="qwen2.5:0.5b">qwen2.5:0.5b</option></select>
      </div>
      <div class="input-wrap">
        <textarea id="messageInput" placeholder="Message..." rows="1"></textarea>
        <button type="button" class="btn-send" id="btnSend">Send</button>
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'ollama_chat_api_key';
    const CONVS_KEY = 'ollama_chat_conversations';

    function getApiKey() { return localStorage.getItem(STORAGE_KEY); }
    function setApiKey(v) { localStorage.setItem(STORAGE_KEY, v); }

    function getConversations() {
      try {
        const raw = localStorage.getItem(CONVS_KEY);
        return raw ? JSON.parse(raw) : [{ id: Date.now(), title: 'New chat', messages: [] }];
      } catch {
        return [{ id: Date.now(), title: 'New chat', messages: [] }];
      }
    }
    function saveConversations(arr) {
      localStorage.setItem(CONVS_KEY, JSON.stringify(arr));
    }

    let conversations = getConversations();
    let currentId = conversations[0].id;

    const apiKeyOverlay = document.getElementById('apiKeyOverlay');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiKeyError = document.getElementById('apiKeyError');
    const apiKeySubmit = document.getElementById('apiKeySubmit');
    const conversationsEl = document.getElementById('conversations');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const btnSend = document.getElementById('btnSend');
    const btnNew = document.getElementById('btnNew');
    const modelSelect = document.getElementById('modelSelect');

    if (getApiKey()) apiKeyOverlay.classList.add('hidden');

    apiKeySubmit.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (!key) { apiKeyError.textContent = 'Enter an API key'; apiKeyError.classList.remove('hidden'); return; }
      setApiKey(key);
      apiKeyError.classList.add('hidden');
      apiKeyOverlay.classList.add('hidden');
    });

    function currentConv() { return conversations.find(c => c.id === currentId) || conversations[0]; }

    function renderConvs() {
      conversationsEl.innerHTML = conversations.map(c => `
        <div class="conv-item ${c.id === currentId ? 'active' : ''}" data-id="${c.id}">${escapeHtml(c.title)}</div>
      `).join('');
      conversationsEl.querySelectorAll('.conv-item').forEach(el => {
        el.addEventListener('click', () => {
          currentId = Number(el.dataset.id);
          renderConvs();
          renderMessages();
        });
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function renderMessages() {
      const conv = currentConv();
      messagesEl.innerHTML = (conv.messages || []).map(m => `
        <div class="message ${m.role}">
          <div class="role">${m.role}</div>
          <div class="content">${escapeHtml(m.content)}</div>
        </div>
      `).join('');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setConvTitle(id, title) {
      const c = conversations.find(x => x.id === id);
      if (c) { c.title = title; saveConversations(conversations); renderConvs(); }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      const key = getApiKey();
      if (!key) { apiKeyOverlay.classList.remove('hidden'); return; }

      const conv = currentConv();
      if (!conv.messages) conv.messages = [];
      conv.messages.push({ role: 'user', content: text });
      if (conv.title === 'New chat') setConvTitle(conv.id, text.slice(0, 36) + (text.length > 36 ? '…' : ''));
      messageInput.value = '';
      renderMessages();

      const placeholder = document.createElement('div');
      placeholder.className = 'message assistant';
      placeholder.innerHTML = '<div class="role">assistant</div><div class="content">…</div>';
      messagesEl.appendChild(placeholder);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      btnSend.disabled = true;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + key,
            'X-API-Key': key
          },
          body: JSON.stringify({
            model: modelSelect.value,
            messages: conv.messages.map(m => ({ role: m.role, content: m.content })),
            stream: false
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        const reply = data.message?.content ?? '';
        conv.messages.push({ role: 'assistant', content: reply });
        saveConversations(conversations);
        placeholder.querySelector('.content').textContent = reply;
      } catch (e) {
        placeholder.querySelector('.content').textContent = 'Error: ' + e.message;
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
      btnSend.disabled = false;
    }

    btnSend.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    btnNew.addEventListener('click', () => {
      const newConv = { id: Date.now(), title: 'New chat', messages: [] };
      conversations.unshift(newConv);
      currentId = newConv.id;
      saveConversations(conversations);
      renderConvs();
      renderMessages();
    });

    renderConvs();
    renderMessages();
  </script>
</body>
</html>
